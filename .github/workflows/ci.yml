name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests
      - name: Pytest (fast tests only)
        working-directory: backend
        env:
          # CI doesn't have a real LLM key; tests marked 'slow' that need one are skipped.
          JUDGE_PROVIDER: deepseek
          IUPAC_PROVIDER: stub
          OPSIN_PROVIDER: opsin_web
        run: pytest -m "not slow"

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci || npm install
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Lint (best-effort)
        working-directory: frontend
        run: npm run lint --if-present
